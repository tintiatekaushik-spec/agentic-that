services:
  - type: web
    name: agentic-that-telegram
    runtime: docker
    rootDir: integrations/telegram
    plan: starter
    healthCheckPath: /
    disk:
      name: telegram-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /app/data
      - key: SERVICE_HOST
        value: 0.0.0.0
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: CORS_ORIGIN
        value: https://deluxe-klepon-926448.netlify.app
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: SESSION_ENCRYPTION_KEY
        sync: false
      - key: USER_PROVISIONING_KEY
        sync: false
