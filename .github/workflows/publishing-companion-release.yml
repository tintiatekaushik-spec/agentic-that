name: Publishing Companion Release

on:
  workflow_dispatch:
  push:
    tags:
      - "publishing-v*"

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/publishing-companion-desktop/package-lock.json

      - name: Install website dependencies
        run: npm ci

      - name: Install desktop dependencies
        run: npm ci --prefix apps/publishing-companion-desktop

      - name: Prepare optional Windows signing certificate
        shell: pwsh
        env:
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CERTIFICATE_BASE64)) {
            Write-Host "No signing certificate configured; producing an unsigned test installer."
            exit 0
          }
          $certificatePath = Join-Path $env:RUNNER_TEMP "agenticthat-signing.pfx"
          [System.IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:CERTIFICATE_BASE64))
          "WINDOWS_CERTIFICATE_FILE=$certificatePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build extension and Windows companion
        run: npm run publishing:release:windows
        env:
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: publishing-companion-windows
          path: artifacts/*
          if-no-files-found: error

      - name: Publish tagged GitHub release
        if: startsWith(github.ref, 'refs/tags/publishing-v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $releaseArguments = @(
            "release", "create", $env:GITHUB_REF_NAME,
            "--verify-tag", "--generate-notes",
            "--title", "AgenticThat Publishing Companion $env:GITHUB_REF_NAME"
          )
          $releaseArguments += (Get-ChildItem -LiteralPath "artifacts" -File | ForEach-Object { $_.FullName })
          & gh @releaseArguments
