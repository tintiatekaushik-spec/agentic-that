# Netlify build configuration.
#
# The keys below are plain configuration, not credentials. Their values are
# common strings ("meta", "v21.0", "sqlite", a file path, public numeric ids)
# that legitimately appear in source and build output, so Netlify's secrets
# scanner false-positives on them — e.g. WA_PROVIDER=meta matches every
# occurrence of the word "meta" in the bundle.
#
# Real secrets (META_ACCESS_TOKEN, META_APP_SECRET, META_WEBHOOK_VERIFY_TOKEN,
# WATI_ACCESS_TOKEN, WATI_WEBHOOK_SECRET) are intentionally NOT listed here and
# remain covered by the scanner.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "WA_PROVIDER,META_API_VERSION,DB_CONNECTOR,DATABASE_PATH,WA_FROM,META_PHONE_NUMBER_ID,META_WABA_ID,META_APP_ID"
