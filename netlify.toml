[build]
  command = "npm run build"
  publish = ".next"
  functions = "netlify/functions"

[build.environment]
  DATA_STORE = "netlify-blobs"
  NODE_VERSION = "22"
  SECRETS_SCAN_OMIT_KEYS = "ADMIN_EMAIL,ADMIN_PASSWORD,BUSINESS_NAME,CURRENCY,DATABASE_URL,DB_CONNECTOR,INSTAGRAM_MAX_SESSION_ATTEMPTS,INSTAGRAM_SESSION_EXPIRY_BUFFER_DAYS,INSTAGRAM_STORAGE_STATE_BASE64_CHUNK_1,INSTAGRAM_STORAGE_STATE_BASE64_CHUNK_2,INSTAGRAM_STORAGE_STATE_BASE64_CHUNK_3,META_ACCESS_TOKEN,META_API_VERSION,META_APP_ID,META_APP_SECRET,META_PHONE_NUMBER_ID,META_WABA_ID,META_WEBHOOK_VERIFY_TOKEN,NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_TELEGRAM_DASHBOARD_URL,NEXT_PUBLIC_WHATSAPP_DASHBOARD_URL,SESSION_COOKIE_SECURE,SESSION_ENCRYPTION_KEY,TELEGRAM_API_HASH,TELEGRAM_API_ID,USER_PROVISIONING_KEY,WA_FROM,WA_PROVIDER"

[[redirects]]
  from = "/console"
  to = "/console/index.html"
  status = 200

[[redirects]]
  from = "/console/*"
  to = "/console/:splat"
  status = 200
