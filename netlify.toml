[build]
  command = "npm run build"
  publish = ".next"
  functions = "netlify/functions"

[build.environment]
  DATA_STORE = "netlify-blobs"
  NEXT_DIST_DIR = ".next"
  NPM_FLAGS = "--include=dev"
  NODE_VERSION = "22"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_TELEGRAM_DASHBOARD_URL,NEXT_PUBLIC_WHATSAPP_DASHBOARD_URL"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "/console"
  to = "/console/index.html"
  status = 200

[[redirects]]
  from = "/console/*"
  to = "/console/:splat"
  status = 200
