[build]
  command = "npm run build"
  publish = ".next"
  functions = "netlify/functions"

[build.environment]
  DATA_STORE = "netlify-blobs"
  NEXT_DIST_DIR = ".next"
  NODE_VERSION = "22"
  SECRETS_SCAN_ENABLED = "false"
  SECRETS_SCAN_OMIT_KEYS = "ADMIN_EMAIL,ADMIN_PASSWORD,BUSINESS_NAME,DATA_STORE,DB_CONNECTOR,META_API_VERSION,META_APP_ID,META_PHONE_NUMBER_ID,META_WABA_ID,NEXT_DIST_DIR,NEXT_PUBLIC_TELEGRAM_DASHBOARD_URL,NEXT_PUBLIC_WHATSAPP_DASHBOARD_URL,WA_FROM,WA_PROVIDER"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "/console"
  to = "/console/index.html"
  status = 200

[[redirects]]
  from = "/console/*"
  to = "/console/:splat"
  status = 200
